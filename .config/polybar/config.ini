[colors]
; --- Gruvbox Dark Palette (Extraída do seu style.css) ---
bg = #282828
bg0_h = #1d2021
bg0_s = #32302f
bg1 = #3c3836
bg2 = #504945
fg = #ebdbb2
fg1 = #fbf1c7
gray = #928374
red = #fb4934
green = #b8bb26
green2 = #98971a
yellow = #fabd2f
blue = #83a598
purple = #d3869b
aqua = #8ec07c
orange = #fe8019

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 22pt
radius = 0

; Background principal (bg0_h) como no seu CSS
background = ${colors.bg0_h}
foreground = ${colors.fg}

; Espaçamentos e margens
padding-left = 2
padding-right = 2
module-margin = 1

; Fonte (Ajustado para tamanho legível no X11)
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=11;3"
font-1 = "Symbols Nerd Font:style=Regular:size=11;3"
; Fallback para ícones coloridos de clima e sistema
font-2 = "Noto Color Emoji:scale=10;3"

; Ordem dos módulos (Traduzido do config.jsonc)
modules-left = arch xworkspaces
modules-center = weather spotify
modules-right = idle_inhibitor pulseaudio bluetooth eth wlan cpu memory temperature battery clock systray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; ==========================================================
; MÓDULOS ESQUERDOS
; ==========================================================

[module/arch]
type = custom/text
content = 󰣇
content-font = 1
content-foreground = ${colors.fg}
; Emulando o hover: no Polybar não tem hover real de CSS, mas deixamos a cor base elegante.

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
enable-scroll = false

label-active = %name%
label-active-background = ${colors.bg2}
label-active-foreground = ${colors.fg1}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.fg}

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.gray}
label-empty-padding = 1

; ==========================================================
; MÓDULOS CENTRAIS
; ==========================================================

[module/weather]
[module/weather]
type = custom/script
exec = wttrbar 2>/dev/null | jq --unbuffered -r '.text'
interval = 3600
format-foreground = ${colors.fg}

; Pega o texto do jq e adiciona o 'C' no final
label = %output%°C

; Nota: Se o seu wttrbar estiver vindo sem a bolinha do grau, 
; mude a linha acima para: label = %output%°C

[module/spotify]
type = custom/script
; 1. Adicionado "--player spotify" para ignorar navegadores e outros players
exec = ~/.config/waybar/mediaplayer.sh --player spotify 2>/dev/null | jq --unbuffered -r '.text'
tail = true

format-prefix = " "
format-background = ${colors.green2}
format-foreground = ${colors.bg}
format-padding = 1

; 2. Configuração explícita do label para habilitar o truncamento
label = %output%
label-maxlen = 40

; ==========================================================
; MÓDULOS DIREITOS
; ==========================================================

[module/idle_inhibitor]
type = custom/script
interval = 1

; Lê o estado real do processo xidlehook no sistema.
; Se o processo estiver "T" (Trace/Stopped), significa que estamos inibindo o bloqueio (Olho Aberto).
; Adicionei uma injeção de cor (Amarelo Gruvbox) para quando estiver ativo, chamando mais atenção.
exec = if [ "$(ps -o state= -C xidlehook | head -n 1 | tr -d ' ')" = "T" ]; then echo "%{F#fabd2f}%{F-}"; else echo ""; fi

; O clique esquerdo avalia o estado atual e dispara a ação inversa (Toggle).
click-left = if [ "$(ps -o state= -C xidlehook | head -n 1 | tr -d ' ')" = "T" ]; then pkill -CONT xidlehook; else pkill -STOP xidlehook; fi

format-foreground = ${colors.gray}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.aqua}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.aqua}

; Formatação explícita para o estado Mutado
format-muted = <label-muted>
format-muted-prefix = 󰝟
format-muted-prefix-foreground = ${colors.gray}
label-muted = " %percentage%%"
label-muted-foreground = ${colors.gray}

click-right = pavucontrol

[module/bluetooth]
type = custom/script
; Verifica o estado a cada 2 segundos. 
; Se estiver "Powered: yes", pinta de Azul. Se não, pinta de Cinza.
exec = if bluetoothctl show | grep -q "Powered: yes"; then echo "%{F#83a598}%{F-}"; else echo "%{F#928374}󰂲%{F-}"; fi
interval = 2

; Clique esquerdo abre o TUI, clique direito liga/desliga o adaptador
click-left = kitty -e bluetui
click-right = rfkill toggle bluetooth

[module/eth]
type = internal/network
interface-type = wired
interval = 2

; Se estiver conectado no cabo, mostra o IP. (Clicar abre as conexões)
format-connected = <label-connected>
label-connected = %{A1:nm-connection-editor:}%local_ip% 󰈀%{A}
label-connected-foreground = ${colors.blue}

; Se tirar o cabo, fica vazio para não poluir a tela e dar espaço para o Wi-Fi
format-disconnected = 

[module/wlan]
type = internal/network
interface-type = wireless
interval = 2

; Se estiver no Wi-Fi, mostra o nome da rede (SSID)
format-connected = <label-connected>
label-connected = %{A1:nm-connection-editor:}
label-connected-foreground = ${colors.blue}

; Se o Wi-Fi cair, mostra o ícone vermelho de desconectado
format-disconnected = <label-disconnected>
label-disconnected = %{A1:nm-connection-editor:}󰖪%{A}
label-disconnected-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.orange}
label = %percentage%%
label-foreground = ${colors.orange}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
label = %percentage_used%%
label-foreground = ${colors.yellow}

[module/temperature]
type = internal/temperature
interval = 10
; Substitua hwmon-path pelo seu exato do Waybar se o auto-detect falhar
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon4/temp1_input
warn-temperature = 100

format = <ramp> <label>
label = %temperature-c%
label-foreground = ${colors.fg}

format-warn = <ramp> <label-warn>
label-warn = %temperature-c%
label-warn-foreground = ${colors.red}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.fg}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
format-charging-foreground = ${colors.green}

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = ${colors.green}

format-full =  <label-full>
format-full-foreground = ${colors.green}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

[module/clock]
type = internal/date
interval = 1
date = %H:%M %d/%m/%y
label =  %date%
label-foreground = ${colors.aqua}

[module/systray]
type = internal/tray
tray-spacing = 8pt
tray-padding = 1
